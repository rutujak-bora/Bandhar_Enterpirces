name: Deploy to AWS Lightsail

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Pull latest code from GitHub
        uses: appleboy/ssh-action@master
        with:
          host: 65.1.96.64
          username: ubuntu
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          port: 22
          script: |
            # If repo folder doesn't exist, clone it fresh
            if [ ! -d "/home/ubuntu/bandhar/.git" ]; then
              rm -rf /home/ubuntu/bandhar
              git clone https://github.com/rutujak-bora/Bandhar_Enterpirces.git /home/ubuntu/bandhar
            else
              cd /home/ubuntu/bandhar
              git fetch --all
              git reset --hard origin/master
            fi

            # Sync latest files to the Nginx web root
            sudo rsync -av --delete \
              --exclude='.git' \
              --exclude='deploy_lightsail.py' \
              /home/ubuntu/bandhar/ /var/www/html/

            # Fix permissions
            sudo chown -R www-data:www-data /var/www/html
            sudo chmod -R 755 /var/www/html

            # Reload Nginx (no downtime)
            sudo systemctl reload nginx
            echo "Deployment successful!"
